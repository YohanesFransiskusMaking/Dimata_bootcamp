<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taksol - Taksi Online</title>

    <link rel="icon" href="/static/logo1.png" type="image/png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- LEAFLET -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
      body {
        background: #f8f9fa;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .container {
        max-width: 800px;
        padding-top: 20px;
        padding-bottom: 100px;
      }

      #map {
        width: 100%;
        height: 300px;
        border-radius: 15px;
      }

      .order-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      .price-box {
        background: linear-gradient(135deg, #0066cc, #003d80);
        color: white;
        border-radius: 15px;
        padding: 15px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- HEADER -->
      <div class="mb-4 text-center">
        <h4 class="fw-bold">
          <i class="bi bi-taxi-front-fill text-primary"></i>
          Taksol - Taksi Online
        </h4>
        <p class="text-muted small">Ride anywhere in Dili, Timor-Leste</p>
      </div>

      <!-- MAP -->
      <div id="map" class="mb-4"></div>

      <!-- ORDER CARD -->
      <div class="order-card">
        <!-- PICKUP -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-geo-alt-fill text-success"></i>
            Pickup Location
          </label>
          <input
            type="text"
            id="pickup"
            class="form-control rounded-pill"
            placeholder="Enter pickup address"
          />
        </div>

        <!-- DESTINATION -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-flag-fill text-danger"></i>
            Destination
          </label>
          <input
            type="text"
            id="destination"
            class="form-control rounded-pill"
            placeholder="Enter destination"
          />
        </div>
        <!-- WHATSAPP -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-whatsapp text-success"></i>
            WhatsApp Number
          </label>
          <input
            type="text"
            id="whatsapp"
            class="form-control rounded-pill"
            placeholder="Example: +6707xxxxxxx"
          />
          <small id="waError" class="text-danger d-none">
            Please enter a valid WhatsApp number
          </small>
        </div>

        <!-- DETAIL LOCATION -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            <i class="bi bi-info-circle-fill text-primary"></i>
            Detailed Location (Optional)
          </label>
          <textarea
            id="detailLocation"
            class="form-control rounded-4"
            rows="2"
            placeholder="Example: Blue gate, near BNU Bank, 2nd floor..."
          ></textarea>
        </div>

        <!-- ESTIMATION -->
        <div class="price-box mb-3">
          <div id="distance">Distance: -</div>
          <div id="price" class="fw-bold">Estimated Price: -</div>
        </div>

        <button class="btn btn-dark rounded-pill w-100" onclick="bookRide()">
          Book Taksol <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </div>
    </div>

    <script>
      // Inisialisasi Map
      const map = L.map("map").setView([-8.5569, 125.5736], 13); // Dili

      //   Tambahkan Tile dari OpenStreetMap
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        // attribution:
        //   '&copy; <a href="https://www.openstreetmap.org/"></a> contributors',
      }).addTo(map);

      let pickupMarker = null;
      let destinationMarker = null;
      let routeLine = null;

      map.on("click", function (e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;

        if (!pickupMarker) {
          pickupMarker = L.marker([lat, lng]).addTo(map);
          document.getElementById("pickup").value =
            lat.toFixed(5) + ", " + lng.toFixed(5);
        } else if (!destinationMarker) {
          destinationMarker = L.marker([lat, lng]).addTo(map);
          document.getElementById("destination").value =
            lat.toFixed(5) + ", " + lng.toFixed(5);

          drawRoute();
          calculateDistance();
        } else {
          // Reset kalau klik lagi
          map.removeLayer(pickupMarker);
          map.removeLayer(destinationMarker);
          if (routeLine) map.removeLayer(routeLine);

          pickupMarker = L.marker([lat, lng]).addTo(map);
          destinationMarker = null;
          routeLine = null;

          document.getElementById("pickup").value =
            lat.toFixed(5) + ", " + lng.toFixed(5);
          document.getElementById("destination").value = "";
          document.getElementById("distance").innerText = "Distance: -";
          document.getElementById("price").innerText = "Estimated Price: -";
        }
      });

      function drawRoute() {
        const from = pickupMarker.getLatLng();
        const to = destinationMarker.getLatLng();

        routeLine = L.polyline([from, to]).addTo(map);
      }

      function calculateDistance() {
        const from = pickupMarker.getLatLng();
        const to = destinationMarker.getLatLng();

        const R = 6371;
        const dLat = ((to.lat - from.lat) * Math.PI) / 180;
        const dLng = ((to.lng - from.lng) * Math.PI) / 180;

        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((from.lat * Math.PI) / 180) *
            Math.cos((to.lat * Math.PI) / 180) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const distance = R * c;

        const price = distance * 2; // $2 per km

        document.getElementById("distance").innerText =
          "Distance: " + distance.toFixed(2) + " km";

        document.getElementById("price").innerText =
          "Estimated Price: $" + price.toFixed(2);
      }

      function bookRide() {
        const whatsapp = document.getElementById("whatsapp").value;
        const detailLocation = document.getElementById("detailLocation").value;

        if (!pickupMarker || !destinationMarker) {
          alert("Please select pickup and destination on map.");
          return;
        }

        if (!whatsapp) {
          document.getElementById("waError").classList.remove("d-none");
          return;
        }

        const orderId = "TSL-" + Math.floor(Math.random() * 10000);

        const orderData = {
          id: orderId,
          pickup: document.getElementById("pickup").value,
          destination: document.getElementById("destination").value,
          whatsapp: whatsapp,
          detailLocation: detailLocation,
          distance: document.getElementById("distance").innerText,
          price: document.getElementById("price").innerText,
          status: 1, // Searching
        };

        localStorage.setItem("currentOrder", JSON.stringify(orderData));

        alert("Searching driver for you...");

        window.location.href = "otw-taksol.html?mode=home";
      }

      const urlParams = new URLSearchParams(window.location.search);
      const mode = urlParams.get("mode");

      if (mode === "home") {
        document.querySelector(".order-card").innerHTML = `
    <div class="text-center">
      <h5 class="fw-bold mb-3">
        <i class="bi bi-hourglass-split text-warning"></i>
        Searching Driver...
      </h5>
      <p class="text-muted">
        We are looking for the nearest driver to pick you up.
      </p>
      <a href="order-detail.html" class="btn btn-primary rounded-pill mt-3">
        Check My Order
      </a>
    </div>
  `;
      }
    </script>
  </body>
</html>
